name: Download Multica Offline Images Suite

on:
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击按钮触发
  schedule:
    - cron: "30 0 * * *" # 每天 8:30（北京时间；GitHub Actions 使用 UTC）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Package All Multica Images
        run: |
          # 定义 Multica 相关的镜像
          IMAGES=(
            "pgvector/pgvector:pg17"
            "ghcr.io/multica-ai/multica-backend:latest"
            "ghcr.io/multica-ai/multica-web:latest"
          )

          echo "=========================================="
          echo "1. 开始拉取 Multica 镜像（共 ${#IMAGES[@]} 个）..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done

          echo "=========================================="
          echo "2. 下载 Multica 最新 Release 产物..."
          curl -L -o multica_linux_amd64.tar.gz \
            https://github.com/multica-ai/multica/releases/latest/download/multica_linux_amd64.tar.gz

          echo "=========================================="
          echo "3. 正在合并打包并进行 gzip 极限压缩..."
          echo "=========================================="
          OUTPUT_NAME="multica-offline-package.tar.gz"
          STAGING_DIR="$(mktemp -d)"
          docker save "${IMAGES[@]}" | gzip > "$STAGING_DIR/multica-images.tar.gz"
          mv multica_linux_amd64.tar.gz "$STAGING_DIR/multica_linux_amd64.tar.gz"
          tar -czf "$OUTPUT_NAME" -C "$STAGING_DIR" multica-images.tar.gz multica_linux_amd64.tar.gz

          echo "=========================================="
          echo "打包成功！Multica 离线包最终大小为："
          du -sh "$OUTPUT_NAME"
          echo "=========================================="

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: multica-offline-package
          path: multica-offline-package.tar.gz
          retention-days: 1 # 在 GitHub 上临时保留 2 天供你点击下载
