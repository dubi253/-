name: Package Superset Images

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * 0'

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Kubernetes Tools
        uses: yokawasa/action-setup-kube-tools@v0.14.0
        with:
          setup-tools: |
            helm
            yq
          helm: "latest"
          yq: "latest"

      # ========== 步骤 1：提取版本号 ==========
      - name: Extract Superset Version from Helm
        id: superset_vars
        run: |
          helm repo add superset https://apache.github.io/superset
          helm repo update
          
          SUPERSET_VERSION=$(helm show chart superset/superset | yq e '.appVersion' -)
          
          if [ -z "$SUPERSET_VERSION" ] || [ "$SUPERSET_VERSION" = "null" ]; then
            echo "Error: 无法从 Helm Chart 提取版本号"
            exit 1
          fi

          echo "检测到的 Superset 版本为: $SUPERSET_VERSION"
          echo "version=$SUPERSET_VERSION" >> $GITHUB_OUTPUT
          # 使用固定的 latest-py312 标签
          echo "target_image=apache/superset:latest-py312" >> $GITHUB_OUTPUT

      # ========== 步骤 2：提取镜像列表并替换 ==========
      - name: Extract Images List and Replace
        id: list_images
        run: |
          helm repo add superset https://apache.github.io/superset 2>/dev/null || true
          helm repo update

          # 从模板提取镜像
          helm template my-superset superset/superset | \
            yq e '.. | select(has("image")) | .image | select(. != null)' - | \
            sort -u > images.txt

          sed -i '/---/d' images.txt
          sed -i '/^\s*$/d' images.txt

          # 替换 Superset 镜像地址
          sed -i 's|apachesuperset\.docker\.scarf\.sh/apache/superset:.*|apache/superset:latest-py312|g' images.txt
          
          # 添加 dockerize 镜像
          if ! grep -qxF "apache/superset:dockerize" images.txt; then
            echo "apache/superset:dockerize" >> images.txt
          fi

          echo "========================================"
          echo "       待拉取镜像列表"
          echo "========================================"
          cat images.txt
          echo "========================================"
          echo "共计 $(wc -l < images.txt) 个镜像"
          echo "========================================"

      # ========== 步骤 3：先拉取所有官方镜像 ==========
      - name: Pull All Official Images
        run: |
          mapfile -t IMAGES < images.txt
          
          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "Error: No images found!"
            exit 1
          fi

          echo "=========================================="
          echo "正在拉取所有官方镜像 (共 ${#IMAGES[@]} 个)..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done
          echo "所有官方镜像拉取完成。"

      # ========== 步骤 4：构建定制镜像 (基于已拉取的镜像) ==========
      - name: Build Custom Superset Image
        run: |
          # 使用固定的 latest-py312 标签
          TARGET_IMAGE="apache/superset:latest-py312"

          echo "=========================================="
          echo "正在基于本地官方镜像构建定制版本..."
          echo "目标标签: $TARGET_IMAGE"
          echo "=========================================="

          cat > Dockerfile.superset-custom <<EOF
          # 引用本地已存在的官方镜像
          FROM ${TARGET_IMAGE}

          # 1. 切换到 root 用户以安装系统级依赖
          USER root

          # 2. 安装构建 mysqlclient 所需的系统库和编译工具
          # default-libmysqlclient-dev: 包含 MySQL 头文件和库
          # pkg-config: 辅助 mysqlclient 查找库路径
          # gcc/g++: 编译器
          RUN apt-get update && \
              apt-get install -y --no-install-recommends \
                  default-libmysqlclient-dev \
                  pkg-config \
                  gcc \
                  g++ \
              && rm -rf /var/lib/apt/lists/*

          # 3. 切换回 superset 用户进行 pip 安装
          # 虽然 root 也可以 pip install，但为了保持环境一致性和安全性，建议切回
          USER superset

          # 4. 安装 Python 依赖
          RUN pip install --no-cache-dir pydoris mysqlclient
          EOF

          # 构建并覆盖标签
          docker build -f Dockerfile.superset-custom -t "$TARGET_IMAGE" .
          
          echo "定制镜像构建完成，已覆盖原镜像标签: $TARGET_IMAGE"

      # ========== 步骤 5：完整打包 Helm Chart ==========
      - name: Package Full Helm Chart
        run: |
          helm repo add superset https://apache.github.io/superset
          helm repo update
          
          echo "正在拉取 Chart 源码..."
          helm pull superset/superset --untar --untardir ./superset-chart-src
          
          CHART_DIR=$(find ./superset-chart-src -maxdepth 1 -type d | tail -n 1)
          echo "Chart 目录: $CHART_DIR"

          echo "正在构建依赖..."
          helm dependency build "$CHART_DIR"

          # 修改 values.yaml 中的镜像地址
          if [ -f "$CHART_DIR/values.yaml" ]; then
            yq e '.image.repository = "apache/superset"' -i "$CHART_DIR/values.yaml"
            yq e '.image.tag = "latest-py312"' -i "$CHART_DIR/values.yaml"
          fi

          echo "正在打包完整的 Helm Chart..."
          OUTPUT_NAME="superset-helm-full.tar.gz"
          tar -czf "$OUTPUT_NAME" -C "$CHART_DIR" .

          echo "========================================"
          echo "  Helm 完整包大小: $(du -sh "$OUTPUT_NAME" | cut -f1)"
          echo "========================================"

      - name: Upload Helm Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: superset-helm-full
          path: superset-helm-full.tar.gz
          retention-days: 1

      # ========== 步骤 6：保存所有镜像 (包含已修改的) ==========
      - name: Save All Images
        run: |
          mapfile -t IMAGES < images.txt
          
          echo "=========================================="
          echo "正在保存所有镜像 (含定制版 Superset)..."
          echo "=========================================="
          OUTPUT_NAME="superset-images.tar.gz"
          
          # docker save 会读取当前本地镜像列表
          # 这里的 apache/superset:latest-py312 已经是构建后的版本了
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"

          echo "=========================================="
          echo "打包成功！最终大小："
          du -sh "$OUTPUT_NAME"
          echo "========================================"

      - name: Upload Images Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: superset-offline-images
          path: superset-images.tar.gz
          retention-days: 1
