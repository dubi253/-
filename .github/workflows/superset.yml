name: Package Superset Images

on:
  # 允许手动触发
  workflow_dispatch:
  # 如果需要定时运行，可以取消下面两行的注释（每周日午夜）
  # schedule:
  #   - cron: '0 0 * * 0'

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Kubernetes Tools
        uses: yokawasa/action-setup-kube-tools@v0.14.0
        with:
          setup-tools: |
            helm
            yq
          helm: "latest"
          yq: "latest"

      - name: Fetch Helm Chart and Extract Images
        run: |
          # 1. 添加并更新 repo
          helm repo add superset https://apache.github.io/superset
          helm repo update

          # 2. 使用 yq 提取镜像，使用 grep -v 剔除 --- 和空行
          helm template my-superset superset/superset | \
            yq e '.. | select(has("image")) | .image | select(. != null)' - | \
            sort -u > images.txt
          sed -i '/---/d' images.txt
          sed -i '/^\s*$/d' images.txt

          echo "========================================"
          echo "       FOUND IMAGES FOR SUPERSET        "
          echo "========================================"
          cat images.txt
          echo "========================================"

      - name: Pull and Save Docker Images
        run: |
          # 3. 将文件读取为 Bash 数组
          mapfile -t IMAGES < images.txt

          # 如果没有找到任何镜像，直接退出
          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "Error: No images found!"
            exit 1
          fi

          echo "=========================================="
          echo "1. 开始拉取 Superset 镜像（共 ${#IMAGES[@]} 个）..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done

          echo "=========================================="
          echo "2. 正在合并打包并进行 gzip 极限压缩..."
          echo "=========================================="
          OUTPUT_NAME="superset-images.tar.gz"
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"

          echo "=========================================="
          echo "打包成功！Superset 离线包最终大小为："
          du -sh "$OUTPUT_NAME"
          echo "=========================================="

      - name: Upload Images Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: superset-offline-images
          path: superset-images.tar.gz
          retention-days: 1
