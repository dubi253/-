name: Download LiteLLM Offline Images Suite

on:
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Pull, Measure and Package Images Individually
        run: |
          # 1. 定义需要下载的特定镜像列表
          IMAGES=(
            "docker.litellm.ai/berriai/litellm:main-stable"
            "postgres:16"
            "prom/prometheus"
            grafana/grafana:latest
          )

          echo "=========================================="
          echo "开始处理镜像（共 ${#IMAGES[@]} 个）..."
          echo "=========================================="

          for img in "${IMAGES[@]}"; do
            echo "------------------------------------------"
            echo ">> 正在下载: $img ..."
            docker pull "$img"
            
            # 输出该镜像在 Docker 中的大小
            echo ">> 镜像下载完成，大小为："
            docker images --format "{{.Size}}" "$img"

            # 将镜像名称中的 / 和 : 替换为下划线 _，以便作为安全的文件名
            SAFE_NAME=$(echo "$img" | tr '/:' '__')
            OUTPUT_NAME="${SAFE_NAME}.tar.gz"

            echo ">> 正在独立打包并压缩: $OUTPUT_NAME ..."
            docker save "$img" | gzip > "$OUTPUT_NAME"

            echo ">> 打包成功！压缩包实际大小为："
            du -sh "$OUTPUT_NAME"
          done
          
          echo "=========================================="
          echo "所有镜像处理完毕！"
          echo "=========================================="

      - name: Upload Image Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: separate-images-package
          # 使用通配符匹配所有生成的 tar.gz 文件
          path: "*.tar.gz"
          retention-days: 1 # 在 GitHub 上临时保留 1 天
