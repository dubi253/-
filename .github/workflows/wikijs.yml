name: Download Wiki.js and PG15 Offline Image

on:
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.0

      - name: Pull and Package Images
        run: |
          IMAGES=(
            "ghcr.io/requarks/wiki:latest"
            "postgres:15"
          )
          OUTPUT_NAME="wikijs-images.tar.gz"

          echo "=========================================="
          echo "1. 开始拉取 Wiki.js 和 PG15 镜像（共 ${#IMAGES[@]} 个）..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done

          echo "=========================================="
          echo "2. 正在合并打包并进行 gzip 极限压缩..."
          echo "=========================================="
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"

          echo "=========================================="
          echo "打包成功！Wiki.js 和 PG15 离线包最终大小为："
          du -sh "$OUTPUT_NAME"
          echo "=========================================="

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wikijs-images.tar.gz
          path: wikijs-images.tar.gz
          retention-days: 2 # 在 GitHub 上临时保留 2 天供你点击下载
