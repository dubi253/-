name: Download GitLab CE Offline Images Suite

on:
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Pull and Package GitLab CE Image
        run: |
          # 定义 GitLab CE 镜像
          IMAGES=(
            "gitlab/gitlab-ce:latest"
          )
          echo "=========================================="
          echo "1. 开始拉取 GitLab CE 镜像（共 ${#IMAGES[@]} 个）..."
          echo "=========================================="
          for img in "${IMAGES[@]}"; do
            echo "正在下载: $img ..."
            docker pull "$img"
          done
          echo "=========================================="
          echo "2. 正在合并打包并进行 gzip 极限压缩..."
          echo "=========================================="
          OUTPUT_NAME="gitlab-ce-image.tar.gz"
          docker save "${IMAGES[@]}" | gzip > "$OUTPUT_NAME"
          
          echo "=========================================="
          echo "打包成功！GitLab CE 离线包最终大小为："
          du -sh "$OUTPUT_NAME"
          echo "=========================================="
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gitlab-ce-image-package
          path: gitlab-ce-image.tar.gz
          retention-days: 1 # 在 GitHub 上临时保留 1 天供你点击下载
