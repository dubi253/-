name: Package Mattermost Resources

on:
  workflow_dispatch:

jobs:
  package-resources:
    runs-on: ubuntu-latest

    steps:
      # ========== 1. 设置工具 ==========
      - name: Setup Kubernetes Tools
        uses: yokawasa/action-setup-kube-tools@v0.14.0
        with:
          setup-tools: |
            helm
            yq
          helm: "latest"
          yq: "latest"

      # ========== 2. 准备 Helm Chart ==========
      - name: Pull and Prepare Charts
        id: prep_chart
        run: |
          helm repo add mattermost https://helm.mattermost.com
          
          echo "拉取最新的 mattermost-operator Chart..."
          helm pull mattermost/mattermost-operator --untar --untardir ./charts/operator


          # 找到解压后的目录
          OPERATOR_CHART_DIR=$(find ./charts/operator -maxdepth 1 -type d -name "mattermost-operator*" | head -n 1)

          echo "operator_chart_dir=$OPERATOR_CHART_DIR" >> $GITHUB_OUTPUT
          echo "Operator Chart 目录: $OPERATOR_CHART_DIR"

      # ========== 3. 动态提取镜像列表 (核心逻辑) ==========
      - name: Extract All Images List
        id: list_images
        run: |
          OPERATOR_CHART_DIR="${{ steps.prep_chart.outputs.operator_chart_dir }}"
          > images_list.txt

          echo "正在提取 Operator 镜像..."
          helm template my-op "$OPERATOR_CHART_DIR" | \
            yq e '.. | select(has("image")) | .image' - | \
            grep -v '^null' | sort -u >> images_list.txt

          echo "添加 Mattermost Enterprise 镜像..."
          echo "mattermost/mattermost-enterprise-edition:latest" >> images_list.txt

          echo "添加 Redis 镜像: redis:latest"
          echo "redis:latest" >> images_list.txt

          echo "添加 PostgreSQL 镜像: postgres:18"
          echo "postgres:18" >> images_list.txt

          # 去重并清理
          sort -u -o images_list.txt images_list.txt
          sed -i '/^$/d' images_list.txt
          sed -i '/---/d' images_list.txt
          sed -i '/^\s*$/d' images_list.txt

          echo "========================================"
          echo "       最终待拉取镜像列表"
          echo "========================================"
          cat images_list.txt
          echo "========================================"
          echo "共计 $(wc -l < images_list.txt) 个镜像"

      # ========== 4. 拉取所有官方镜像 ==========
      - name: Pull All Official Images
        run: |
          if [ ! -s images_list.txt ]; then
            echo "Error: 镜像列表为空！"
            exit 1
          fi

          # 读取列表并拉取
          while IFS= read -r img; do
            echo "正在拉取: $img"
            docker pull "$img"
          done < images_list.txt
          echo "所有镜像拉取完成。"

      - name: Checkout mattermost-patched-enterprise repository
        uses: actions/checkout@v7.0.0
        with:
          repository: WasserEsser/mattermost-patched-enterprise
          path: mattermost-patched-enterprise
          fetch-depth: 0
          submodules: recursive

      - name: Checkout mattermost docs repository
        uses: actions/checkout@v7.0.0
        with:
          repository: mattermost/docs
          path: mattermost-docs
          fetch-depth: 0

      - name: Build patched Mattermost image
        working-directory: mattermost-patched-enterprise
        run: |
          echo "使用上一步拉取的 patch 代码构建 patched image..."
          test -f Dockerfile
          test -f patch.sh

          docker build \
            --build-arg MATTERMOST_IMAGE_TAG=latest \
            --tag mattermost/mattermost-enterprise-edition:latest \
            -f Dockerfile \
            .

          echo "构建完成，当前镜像："
          docker image inspect mattermost/mattermost-enterprise-edition:latest --format '{{.Id}} {{.RepoTags}}'

      - name: Package patched repository contents
        run: |
          echo "打包补丁仓库内容..."
          tar -czf mattermost-patched-enterprise.tar.gz -C mattermost-patched-enterprise .
          ls -lh mattermost-patched-enterprise.tar.gz

      - name: Package deployment guide server contents
        run: |
          echo "打包 mattermost/docs 的 deployment guide server 内容..."
          mkdir -p deployment-guide-server
          cp -r mattermost-docs/source/deployment-guide/server/. deployment-guide-server/
          tar -czf deployment-guide-server.tar.gz -C deployment-guide-server .
          ls -lh deployment-guide-server.tar.gz

      # ========== 5. 打包 Helm Chart ==========
      - name: Package Helm Chart
        id: package_chart
        run: |
          CHART_DIR="${{ steps.prep_chart.outputs.operator_chart_dir }}"
          echo "正在构建依赖..."
          # 尝试构建依赖（有些 chart 依赖其他 chart）
          helm dependency build "$CHART_DIR" 2>/dev/null || echo "无依赖或依赖已存在"

          echo "正在打包 Helm Chart..."
          rm -f ./*.tgz
          helm package "$CHART_DIR" -d .
          CHART_PACKAGE=$(find . -maxdepth 1 -name "*.tgz" | head -n 1)
          echo "chart_package=$CHART_PACKAGE" >> $GITHUB_OUTPUT
          echo "Helm Chart 包: $CHART_PACKAGE"
          echo "Helm Chart 打包完成。"

      # ========== 6. 保存所有镜像 ==========
      - name: Save All Images
        run: |
          # 再次确认要保存的镜像（基于实际拉取成功的）
          # 这里简单处理，直接使用列表中的镜像名保存
          # 注意：如果 pull 了 tag:latest，save 的也是 tag:latest

          # 将文件内容转换为数组参数
          IMAGES=$(cat images_list.txt | tr '\n' ' ')

          echo "正在保存镜像到 mattermost-images.tar.gz ..."
          docker save $IMAGES | gzip > mattermost-images.tar.gz

          echo "========================================"
          echo "打包成功！"
          ls -lh mattermost-images.tar.gz
          echo "========================================"

      # ========== 7. 上传 Artifacts ==========
      - name: Upload Helm Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mattermost-helm-chart
          path: ${{ steps.package_chart.outputs.chart_package }}
          retention-days: 1

      - name: Upload Images Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mattermost-images
          path: mattermost-images.tar.gz
          retention-days: 1

      - name: Upload Patched Repository Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mattermost-patched-enterprise
          path: mattermost-patched-enterprise.tar.gz
          retention-days: 1

      - name: Upload Deployment Guide Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: deployment-guide-server
          path: deployment-guide-server.tar.gz
          retention-days: 1
