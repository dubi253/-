name: Package Mattermost Resources

on:
  workflow_dispatch:
    inputs:
      mattermost_version:
        description: "Mattermost版本 (留空则使用 latest)"
        required: false
        default: ""
      operator_version:
        description: "Mattermost Operator版本 (留空则使用最新 Chart)"
        required: false
        default: ""

jobs:
  package-resources:
    runs-on: ubuntu-latest

    steps:
      # ========== 1. 设置工具 ==========
      - name: Setup Kubernetes Tools
        uses: yokawasa/action-setup-kube-tools@v0.14.0
        with:
          setup-tools: |
            helm
            yq
          helm: "latest"
          yq: "latest"

      # ========== 2. 准备 Helm Chart ==========
      - name: Pull and Prepare Charts
        id: prep_chart
        run: |
          helm repo add mattermost https://helm.mattermost.com
          OPERATOR_VER="${{ inputs.operator_version }}"
          if [ -z "$OPERATOR_VER" ]; then
            echo "拉取最新的 mattermost-operator Chart..."
            helm pull mattermost/mattermost-operator --untar --untardir ./charts/operator
          else
            echo "拉取指定版本的 mattermost-operator Chart: $OPERATOR_VER"
            helm pull mattermost/mattermost-operator --version "$OPERATOR_VER" --untar --untardir ./charts/operator
          fi

          echo "拉取 mattermost-team-edition Chart..."
          helm pull mattermost/mattermost-team-edition --untar --untardir ./charts/team-edition

          # 找到解压后的目录
          OPERATOR_CHART_DIR=$(find ./charts/operator -maxdepth 1 -type d -name "mattermost-operator*" | head -n 1)
          TEAM_CHART_DIR=$(find ./charts/team-edition -maxdepth 1 -type d -name "mattermost-team-edition*" | head -n 1)
          echo "operator_chart_dir=$OPERATOR_CHART_DIR" >> $GITHUB_OUTPUT
          echo "team_chart_dir=$TEAM_CHART_DIR" >> $GITHUB_OUTPUT
          echo "Operator Chart 目录: $OPERATOR_CHART_DIR"
          echo "Team Edition Chart 目录: $TEAM_CHART_DIR"

      # ========== 3. 动态提取镜像列表 (核心逻辑) ==========
      - name: Extract All Images List
        id: list_images
        run: |
          OPERATOR_CHART_DIR="${{ steps.prep_chart.outputs.operator_chart_dir }}"
          TEAM_CHART_DIR="${{ steps.prep_chart.outputs.team_chart_dir }}"
          > images_list.txt

          echo "正在提取 Operator 镜像..."
          helm template my-op "$OPERATOR_CHART_DIR" | \
            yq e '.. | select(has("image")) | .image' - | \
            grep -v '^null' | sort -u >> images_list.txt

          APP_VER="${{ inputs.mattermost_version }}"
          if [ -z "$APP_VER" ]; then
            APP_VER="latest"
          fi

          echo "正在提取 Team Edition 镜像，Mattermost tag 使用: ${APP_VER}"
          helm template my-mm "$TEAM_CHART_DIR" \
            --set image.tag="$APP_VER" \
            --set mysql.enabled=false \
            --set externalDB.enabled=true \
            --set externalDB.externalDriverType=postgres | \
            yq e '.. | select(has("image")) | .image' - | \
            grep -v '^null' | sort -u >> images_list.txt

          # echo "添加 PostgreSQL 镜像: postgres:18"
          # echo "postgres:18" >> images_list.txt

          # 去重并清理
          sort -u -o images_list.txt images_list.txt
          sed -i '/^$/d' images_list.txt
          sed -i '/---/d' images.txt
          sed -i '/^\s*$/d' images.txt

          echo "========================================"
          echo "       最终待拉取镜像列表"
          echo "========================================"
          cat images_list.txt
          echo "========================================"
          echo "共计 $(wc -l < images_list.txt) 个镜像"

      # ========== 4. 拉取所有官方镜像 ==========
      - name: Pull All Official Images
        run: |
          if [ ! -s images_list.txt ]; then
            echo "Error: 镜像列表为空！"
            exit 1
          fi

          # 读取列表并拉取
          while IFS= read -r img; do
            echo "正在拉取: $img"
            docker pull "$img"
          done < images_list.txt
          echo "所有镜像拉取完成。"

      # ========== 5. 打包 Helm Chart ==========
      - name: Package Helm Chart
        run: |
          CHART_DIR="${{ steps.prep_chart.outputs.operator_chart_dir }}"
          echo "正在构建依赖..."
          # 尝试构建依赖（有些 chart 依赖其他 chart）
          helm dependency build "$CHART_DIR" 2>/dev/null || echo "无依赖或依赖已存在"

          echo "正在打包 Helm Chart..."
          tar -czf mattermost-operator-helm.tar.gz -C "$CHART_DIR" .
          echo "Helm Chart 打包完成。"

      # ========== 6. 保存所有镜像 ==========
      - name: Save All Images
        run: |
          # 再次确认要保存的镜像（基于实际拉取成功的）
          # 这里简单处理，直接使用列表中的镜像名保存
          # 注意：如果 pull 了 tag:latest，save 的也是 tag:latest

          # 将文件内容转换为数组参数
          IMAGES=$(cat images_list.txt | tr '\n' ' ')

          echo "正在保存镜像到 mattermost-images.tar.gz ..."
          docker save $IMAGES | gzip > mattermost-images.tar.gz

          echo "========================================"
          echo "打包成功！"
          ls -lh mattermost-images.tar.gz
          echo "========================================"

      # ========== 7. 上传 Artifacts ==========
      - name: Upload Helm Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mattermost-helm-chart
          path: mattermost-operator-helm.tar.gz
          retention-days: 1

      - name: Upload Images Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mattermost-images
          path: mattermost-images.tar.gz
          retention-days: 1
