services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=openvsx
      - POSTGRES_PASSWORD=openvsx
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5432:5432"
    profiles:
      - db
      - debug

  elasticsearch:
    image: elasticsearch:9.4.3
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - 9200:9200
      - 9300:9300
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: curl -s http://elasticsearch01:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 50
      start_period: 5s
    profiles:
      - es
      - debug

  kibana:
    image: kibana:9.4.3
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    profiles:
      - kibana

  server:
    image: ghcr.io/eclipse-openvsx/openvsx-server:latest
    volumes:
      - ./application.yml:/home/openvsx/server/config/application.yml:ro
    ports:
      - 8101:8080
    depends_on:
      - postgres
      - elasticsearch
    healthcheck:
      test: "curl --fail --silent localhost:8081/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 50
      start_period: 5s

  webui:
    image: ghcr.io/eclipse-openvsx/openvsx-webui:latest
    ports:
      - 8100:3000
    depends_on:
      - server

volumes:
  pg_data:
    driver: local
